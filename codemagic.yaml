workflows:
  ios-build:
    name: DocumentScanner iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: 16.2
      ios_signing:
        distribution_type: development
        bundle_identifier: com.benjaminpalma.documentscanner
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Set Team ID
        script: |
          sed -i '' "s/DEVELOPMENT_TEAM = \"\"/DEVELOPMENT_TEAM = YDT3D73D9T/g" DocumentScanner.xcodeproj/project.pbxproj || true
      - name: Build iOS app for device
        script: |
          xcodebuild \
            -project DocumentScanner.xcodeproj \
            -scheme DocumentScanner \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            DEVELOPMENT_TEAM=YDT3D73D9T \
            CODE_SIGN_STYLE=Automatic \
            build
      - name: Export IPA
        script: |
          APP_PATH=$(find build -name "*.app" | head -1)
          mkdir -p output
          xcrun PackageApplication "$APP_PATH" -o "$(pwd)/output/DocumentScanner.ipa"
    artifacts:
      - output/DocumentScanner.ipa
