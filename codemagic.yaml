workflows:
  ios-build:
    name: DocumentScanner iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: 16.2
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build iOS app for simulator
        script: |
          xcodebuild \
            -project DocumentScanner.xcodeproj \
            -scheme DocumentScanner \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Zip .app for download
        script: |
          APP_PATH=$(find build -name "*.app" | head -1)
          zip -r DocumentScanner.app.zip "$APP_PATH"
    artifacts:
      - DocumentScanner.app.zip
