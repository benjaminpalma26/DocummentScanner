workflows:
  ios-build:
    name: DocumentScanner iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: 16.2
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -project DocumentScanner.xcodeproj \
            -scheme DocumentScanner \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            build

          APP_PATH=$(find build -name "*.app" | head -1)
          echo "App path: $APP_PATH"

          # Verificar que Info.plist tiene NSCameraUsageDescription
          plutil -p "$APP_PATH/Info.plist" | grep -i camera || echo "WARNING: Camera key missing"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r DocumentScanner.ipa Payload
          rm -rf Payload
    artifacts:
      - DocumentScanner.ipa
